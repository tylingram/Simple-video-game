name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r rts-game/requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller game.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Zip the build
        run: Compress-Archive -Path "dist/RTS Game" -DestinationPath "RTS_Game_Windows.zip" -CompressionLevel Optimal -Force
        shell: powershell

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          files: RTS_Game_Windows.zip
          body: "Download RTS_Game_Windows.zip, unzip it, and double-click **RTS Game.exe** to play."
