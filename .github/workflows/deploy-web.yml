name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1920 --height 1080 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          html = html.replace('gui_divider : 2', 'gui_divider : 1')
          inject = """<style>
          html,body{margin:0;padding:0;background:#000!important;overflow:hidden;}
          #pyconsole,#crt,#transfer{display:none!important;}
          </style>
          <script>
          window.addEventListener('load',function(){ window.onbeforeunload=null; });
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
