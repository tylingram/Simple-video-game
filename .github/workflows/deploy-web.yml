name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1920 --height 1080 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib, re
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          # Robust gui_divider patch — handles any whitespace around the colon/value
          html = re.sub(r'(gui_divider\s*:\s*)2', r'\g<1>1', html)
          inject = """<style>
          html,body{margin:0;padding:0;width:100%;height:100%;background:#000!important;overflow:hidden;}
          #pyconsole,#crt,#transfer{display:none!important;}
          /* Force canvas to 16:9, centered, never stretched */
          canvas{
            display:block!important;
            position:fixed!important;
            top:50%!important;left:50%!important;
            transform:translate(-50%,-50%)!important;
            width:min(100vw,calc(100vh * 16/9))!important;
            height:min(100vh,calc(100vw * 9/16))!important;
            image-rendering:pixelated;
            background:#000;
          }
          </style>
          <script>
          window.addEventListener('load',function(){ window.onbeforeunload=null; });
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
