name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1920 --height 1080 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib, re
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          # Robust gui_divider patch — handles any whitespace around the colon/value
          html = re.sub(r'(gui_divider\s*:\s*)2', r'\g<1>1', html)
          inject = """<style>
          html,body{margin:0;padding:0;width:100%;height:100%;background:#000!important;overflow:hidden;}
          #pyconsole,#crt,#transfer{display:none!important;}
          canvas{background:#000;}
          </style>
          <script>
          /* Force canvas to 16:9 centered, overriding pygbag inline styles via setProperty+important.
             MutationObserver re-applies whenever pygbag resets the style attribute so mouse
             coords (derived from getBoundingClientRect) stay in sync with the visual position. */
          (function(){
            var busy = false;
            function fix(){
              if(busy) return;
              var c = document.getElementById('canvas') || document.querySelector('canvas');
              if(!c) return;
              var vw = window.innerWidth, vh = window.innerHeight;
              var cw, ch;
              if(vw * 9 > vh * 16){ cw = Math.floor(vh*16/9); ch = vh; }
              else { cw = vw; ch = Math.floor(vw*9/16); }
              var l = Math.round((vw-cw)/2), t = Math.round((vh-ch)/2);
              busy = true;
              c.style.setProperty('position','fixed','important');
              c.style.setProperty('left', l+'px','important');
              c.style.setProperty('top',  t+'px','important');
              c.style.setProperty('width', cw+'px','important');
              c.style.setProperty('height',ch+'px','important');
              c.style.setProperty('transform','none','important');
              c.style.setProperty('margin','0','important');
              busy = false;
            }
            function waitForCanvas(){
              var c = document.getElementById('canvas') || document.querySelector('canvas');
              if(!c){ setTimeout(waitForCanvas,100); return; }
              new MutationObserver(function(){ if(!busy) requestAnimationFrame(fix); })
                .observe(c,{attributes:true,attributeFilter:['style']});
              window.addEventListener('resize', fix);
              fix();
            }
            window.addEventListener('load',function(){
              window.onbeforeunload = null;
              setTimeout(waitForCanvas, 100);
            });
          })();
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
