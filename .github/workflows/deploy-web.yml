name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          # Inject JS that runs on a timer and overrides pygbag's inline canvas styles
          inject = """<script>
          (function(){
            function fix(){
              var c=document.getElementById('canvas');
              if(c){
                c.style.setProperty('position','fixed','important');
                c.style.setProperty('top','0','important');
                c.style.setProperty('left','0','important');
                c.style.setProperty('width','100vw','important');
                c.style.setProperty('height','100vh','important');
                c.style.setProperty('z-index','9999','important');
              }
              document.body.style.setProperty('background','#000','important');
              document.body.style.setProperty('overflow','hidden','important');
              ['pyconsole','crt','transfer','infobox'].forEach(function(id){
                var el=document.getElementById(id);
                if(el) el.style.setProperty('display','none','important');
              });
            }
            setInterval(fix, 50);
            document.addEventListener('DOMContentLoaded', fix);
            window.addEventListener('load', fix);
          })();
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
