name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text()
          inject = """
          <style>
            html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
          </style>
          <script>
            function fitCanvas() {
              var c = document.querySelector('canvas');
              if (!c) return;
              var gw = 1280, gh = 720;
              var ww = window.innerWidth, wh = window.innerHeight;
              var scale = Math.min(ww / gw, wh / gh);
              var dw = Math.floor(gw * scale), dh = Math.floor(gh * scale);
              c.style.position = 'fixed';
              c.style.left = Math.floor((ww - dw) / 2) + 'px';
              c.style.top  = Math.floor((wh - dh) / 2) + 'px';
              c.style.width  = dw + 'px';
              c.style.height = dh + 'px';
            }
            window.addEventListener('load',   fitCanvas);
            window.addEventListener('resize', fitCanvas);
            setTimeout(fitCanvas, 500);
            setTimeout(fitCanvas, 1500);
          </script>
          """
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html)
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
