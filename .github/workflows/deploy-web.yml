name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          html = html.replace('gui_divider : 2', 'gui_divider : 1')
          # Replace canvas CSS in the template to be fixed/fullscreen from the start
          html = html.replace(
            'canvas.emscripten {\n            border: 0px none;\n            background-color: transparent;\n            width: 100%;\n            height: 100%;\n            z-index: 5;\n\n            padding: 0;\n            margin: 0 auto;\n\n            position: absolute;\n            top: 0;\n            bottom: 0;\n            left: 0;\n            right: 0;\n        }',
            'canvas.emscripten { border:0; background:transparent; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:9999; padding:0; margin:0; }'
          )
          inject = """<style>
          html,body{margin:0;padding:0;width:100%;height:100%;background:#000!important;overflow:hidden;}
          #pyconsole,#crt,#transfer{display:none!important;}
          </style>
          <script>
          (function(){
            window.onbeforeunload=null;
            window.addEventListener('load',function(){ window.onbeforeunload=null; });
          })();
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
