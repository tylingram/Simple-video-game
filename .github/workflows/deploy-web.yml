name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib, re
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text()
          # 1. Use full viewport — gui_divider:2 splits screen in half for terminal
          html = html.replace('gui_divider : 2', 'gui_divider : 1')
          # 2. Black background instead of powderblue
          html = html.replace('background-color:powderblue', 'background-color:#000')
          html = html.replace("background-color: black", "background-color:#000")
          # 3. Hide the pyconsole/terminal div completely
          html = html.replace('<div id="pyconsole">', '<div id="pyconsole" hidden>')
          p.write_text(html)
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
