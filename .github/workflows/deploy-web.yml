name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          inject = """<style>
          html, body { margin:0; padding:0; background:#000 !important; overflow:hidden; width:100%; height:100%; }
          #pyconsole, #crt, #transfer { display:none !important; }
          </style>
          <script>
          (function(){
            var GW=1280, GH=720;
            function scale(){
              var c=document.getElementById('canvas');
              if(!c) return;
              var sw=window.innerWidth, sh=window.innerHeight;
              var s=Math.min(sw/GW, sh/GH);
              var tw=Math.round(GW*s), th=Math.round(GH*s);
              // Use transform scale so we never change the canvas pixel size
              c.style.position='fixed';
              c.style.width=GW+'px';
              c.style.height=GH+'px';
              c.style.left=Math.round((sw-tw)/2)+'px';
              c.style.top=Math.round((sh-th)/2)+'px';
              c.style.transformOrigin='top left';
              c.style.transform='scale('+s+')';
              c.style.zIndex='9999';
              document.body.style.background='#000';
              ['pyconsole','crt','transfer'].forEach(function(id){
                var el=document.getElementById(id);
                if(el) el.style.display='none';
              });
            }
            setInterval(scale, 100);
            window.addEventListener('resize', scale);
            window.addEventListener('load', scale);
          })();
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
