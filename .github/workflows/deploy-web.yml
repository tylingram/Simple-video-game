name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          inject = """<style>
          html, body { margin:0; padding:0; background:#000 !important; overflow:hidden; }
          #pyconsole, #crt, #transfer { display:none !important; }
          </style>
          <script>
          (function(){
            var GW=1280, GH=720;
            var _locking=false;
            function applyScale(c){
              if(_locking) return;
              _locking=true;
              var sw=window.innerWidth, sh=window.innerHeight;
              var s=Math.min(sw/GW, sh/GH);
              c.style.cssText=[
                'position:fixed !important',
                'width:'+GW+'px !important',
                'height:'+GH+'px !important',
                'left:'+Math.round((sw-GW*s)/2)+'px !important',
                'top:'+Math.round((sh-GH*s)/2)+'px !important',
                'transform-origin:top left !important',
                'transform:scale('+s+') !important',
                'z-index:9999 !important',
                'margin:0 !important',
                'padding:0 !important'
              ].join(';');
              _locking=false;
            }
            function attach(){
              var c=document.getElementById('canvas');
              if(!c){ setTimeout(attach,100); return; }
              applyScale(c);
              new MutationObserver(function(){ applyScale(c); })
                .observe(c, {attributes:true, attributeFilter:['style','width','height']});
              window.addEventListener('resize', function(){ applyScale(c); });
              document.body.style.background='#000';
              ['pyconsole','crt','transfer'].forEach(function(id){
                var el=document.getElementById(id);
                if(el) el.style.display='none';
              });
            }
            document.addEventListener('DOMContentLoaded', attach);
            window.addEventListener('load', attach);
            setTimeout(attach, 0);
            // Remove any beforeunload prompt — players shouldn't see "changes may not be saved"
            window.addEventListener('load', function(){
              window.onbeforeunload = null;
            });
          })();
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
