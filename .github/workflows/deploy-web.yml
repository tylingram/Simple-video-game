name: Deploy Web (pygbag)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: python -m pygbag --build --width 1280 --height 720 --app_name "Island RTS" rts-game/main.py

      - name: Patch HTML for fullscreen layout
        run: |
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('rts-game/build/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('background-color:powderblue', 'background-color:#000')
          # Also patch gui_divider in config — 2 splits canvas to half height
          html = html.replace('gui_divider : 2', 'gui_divider : 1')
          inject = """<style>
          html,body{margin:0;padding:0;background:#000!important;overflow:hidden;}
          #pyconsole,#crt,#transfer{display:none!important;}
          </style>
          <script>
          // Hijack window_resize before pygbag's CDN JS can define it.
          // Object.defineProperty means pygbag's "window_resize = function(){...}"
          // assignments are silently ignored — our version always wins.
          (function(){
            var GW=1280,GH=720;
            function myResize(){
              var c=document.getElementById('canvas');
              if(!c)return;
              var sw=window.innerWidth,sh=window.innerHeight;
              var s=Math.min(sw/GW,sh/GH);
              var l=Math.round((sw-GW*s)/2),t=Math.round((sh-GH*s)/2);
              c.setAttribute('style',
                'position:fixed;width:'+GW+'px;height:'+GH+'px;'+
                'left:'+l+'px;top:'+t+'px;'+
                'transform-origin:top left;transform:scale('+s+');'+
                'z-index:9999;margin:0;padding:0;');
              document.body.style.background='#000';
              ['pyconsole','crt','transfer','infobox'].forEach(function(id){
                var el=document.getElementById(id);
                if(el)el.style.display='none';
              });
              window.onbeforeunload=null;
            }
            // Lock window_resize so pygbag cannot overwrite it
            Object.defineProperty(window,'window_resize',{
              get:function(){return myResize;},
              set:function(){},
              configurable:false
            });
            window.addEventListener('resize',myResize);
            window.addEventListener('load',myResize);
            setTimeout(myResize,500);
            setTimeout(myResize,2000);
          })();
          </script>"""
          html = html.replace('</head>', inject + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rts-game/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
