<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Island RTS — Multiplayer Lobby</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a110a;
    color: #9dcc9d;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 4px;
    color: #c8ffc8;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .subtitle { color: #4a8a4a; font-size: 0.85rem; margin-bottom: 32px; letter-spacing: 2px; }

  .card {
    background: #111811;
    border: 1px solid #2a4a2a;
    border-radius: 6px;
    padding: 24px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 0.8rem; letter-spacing: 3px; color: #4a8a4a; margin-bottom: 16px; text-transform: uppercase; }

  /* Join form */
  .join-row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1;
    background: #0a110a;
    border: 1px solid #2a5a2a;
    color: #c8ffc8;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 1rem;
    border-radius: 4px;
    outline: none;
  }
  input[type=text]:focus { border-color: #5aaa5a; }
  input[type=text]::placeholder { color: #2a5a2a; }

  button {
    background: #1a3a1a;
    border: 1px solid #3a7a3a;
    color: #8acc8a;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { background: #2a5a2a; color: #c8ffc8; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.danger { border-color: #7a3a3a; color: #cc8a8a; background: #3a1a1a; }
  button.danger:hover:not(:disabled) { background: #5a2a2a; color: #ffc8c8; }

  /* Status dot */
  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #4a8a4a; margin-top: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #2a4a2a; flex-shrink: 0; }
  .dot.green { background: #3aaa3a; box-shadow: 0 0 6px #3aaa3a; }
  .dot.yellow { background: #aaaa3a; box-shadow: 0 0 6px #aaaa3a; }
  .dot.red { background: #aa3a3a; box-shadow: 0 0 6px #aa3a3a; }

  /* Player list */
  #player-list { list-style: none; min-height: 60px; }
  #player-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid #1a2a1a;
    gap: 12px;
  }
  #player-list li:last-child { border-bottom: none; }
  .player-name { flex: 1; color: #c8ffc8; }
  .empty-msg { color: #2a5a2a; font-style: italic; font-size: 0.85rem; padding: 12px 0; text-align: center; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-bg.visible { display: flex; }
  .modal {
    background: #111811;
    border: 1px solid #3a7a3a;
    border-radius: 8px;
    padding: 32px;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }
  .modal h3 { color: #c8ffc8; margin-bottom: 12px; font-size: 1.1rem; }
  .modal p  { color: #6aaa6a; margin-bottom: 24px; font-size: 0.9rem; }
  .modal-btns { display: flex; gap: 12px; justify-content: center; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a3a1a; border: 1px solid #3a7a3a; color: #8acc8a;
    padding: 10px 24px; border-radius: 4px;
    font-size: 0.85rem; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  .waiting-msg { color: #aaaa3a; font-size: 0.85rem; margin-top: 10px; text-align: center; }
</style>
</head>
<body>

<h1>Island RTS</h1>
<p class="subtitle">Multiplayer Lobby</p>

<!-- Join card -->
<div class="card" id="join-card">
  <h2>Enter Your Name</h2>
  <div class="join-row">
    <input type="text" id="name-input" placeholder="Callsign..." maxlength="20" autocomplete="off">
    <button id="join-btn">JOIN</button>
  </div>
  <div class="status-bar">
    <div class="dot yellow" id="status-dot"></div>
    <span id="status-text">Connecting to server…</span>
  </div>
</div>

<!-- Lobby card -->
<div class="card" id="lobby-card" style="display:none">
  <h2>Online Players</h2>
  <ul id="player-list">
    <li><span class="empty-msg">Waiting for other players…</span></li>
  </ul>
  <p class="waiting-msg" id="waiting-msg" style="display:none">Waiting for response…</p>
</div>

<!-- Incoming challenge modal -->
<div class="modal-bg" id="challenge-modal">
  <div class="modal">
    <h3>Incoming Challenge</h3>
    <p id="challenge-text">Someone wants to fight!</p>
    <div class="modal-btns">
      <button id="accept-btn">ACCEPT</button>
      <button class="danger" id="decline-btn">DECLINE</button>
    </div>
  </div>
</div>

<!-- Match starting modal -->
<div class="modal-bg" id="starting-modal">
  <div class="modal">
    <h3>Match Starting…</h3>
    <p id="starting-text">Launching game vs Opponent</p>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// After deploying the server to Render, set the GitHub Actions variable
// MP_SERVER_URL and the deploy workflow will replace REPLACE_SERVER_URL below.
const SERVER_URL = "REPLACE_SERVER_URL";
const GAME_URL   = "index.html";   // relative URL of the pygbag game

// ── State ─────────────────────────────────────────────────────────────────────
let ws            = null;
let myName        = "";
let pendingFromId = null;
let pendingFromName = "";
let challengeSentTo = null;

// ── DOM ───────────────────────────────────────────────────────────────────────
const statusDot     = document.getElementById("status-dot");
const statusText    = document.getElementById("status-text");
const joinCard      = document.getElementById("join-card");
const lobbyCard     = document.getElementById("lobby-card");
const nameInput     = document.getElementById("name-input");
const joinBtn       = document.getElementById("join-btn");
const playerList    = document.getElementById("player-list");
const waitingMsg    = document.getElementById("waiting-msg");
const challengeMod  = document.getElementById("challenge-modal");
const challengeText = document.getElementById("challenge-text");
const acceptBtn     = document.getElementById("accept-btn");
const declineBtn    = document.getElementById("decline-btn");
const startingMod   = document.getElementById("starting-modal");
const startingText  = document.getElementById("starting-text");
const toast         = document.getElementById("toast");

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(SERVER_URL);

  ws.onopen = function() {
    setStatus("green", "Connected — enter your name to join");
    joinBtn.disabled = false;
  };

  ws.onclose = function() {
    setStatus("red", "Disconnected — reload to reconnect");
    joinBtn.disabled = true;
    setTimeout(connect, 3000);
  };

  ws.onerror = function() {
    setStatus("red", "Connection error");
  };

  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
}

function setStatus(color, text) {
  statusDot.className  = "dot " + color;
  statusText.textContent = text;
}

// ── Message handler ───────────────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {

    case "lobby_update":
      renderPlayerList(msg.players);
      break;

    case "challenge_received":
      pendingFromId   = msg.from_id;
      pendingFromName = msg.from_name;
      challengeText.textContent = `${msg.from_name} wants to fight!`;
      challengeMod.classList.add("visible");
      break;

    case "challenge_declined":
      challengeSentTo = null;
      waitingMsg.style.display = "none";
      showToast(`${msg.from_name} declined your challenge`);
      break;

    case "match_start":
      challengeMod.classList.remove("visible");
      startingText.textContent = `Launching vs ${msg.opponent_name}…`;
      startingMod.classList.add("visible");
      // Small delay then redirect into the game
      setTimeout(function() {
        const params = new URLSearchParams({
          mp:       "1",
          room:     msg.room_id,
          role:     msg.role,
          server:   SERVER_URL,
          opponent: msg.opponent_name,
        });
        window.location.href = GAME_URL + "?" + params.toString();
      }, 1200);
      break;
  }
}

// ── Player list ───────────────────────────────────────────────────────────────
function renderPlayerList(players) {
  playerList.innerHTML = "";
  const others = players.filter(p => p.name !== myName);

  if (others.length === 0) {
    const li = document.createElement("li");
    li.innerHTML = '<span class="empty-msg">No other players online yet…</span>';
    playerList.appendChild(li);
    return;
  }

  others.forEach(function(p) {
    const li  = document.createElement("li");
    const btn = document.createElement("button");
    btn.textContent = "CHALLENGE";
    btn.disabled    = (challengeSentTo !== null);
    btn.onclick     = function() { sendChallenge(p.id, p.name); };

    const span = document.createElement("span");
    span.className   = "player-name";
    span.textContent = p.name;

    li.appendChild(span);
    li.appendChild(btn);
    playerList.appendChild(li);
  });
}

// ── Actions ───────────────────────────────────────────────────────────────────
joinBtn.onclick = function() {
  const name = nameInput.value.trim();
  if (!name) return;
  myName = name;
  send({ type: "join", name: name });
  joinCard.style.display  = "none";
  lobbyCard.style.display = "block";
};

nameInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") joinBtn.click();
});

function sendChallenge(targetId, targetName) {
  challengeSentTo = targetId;
  waitingMsg.style.display = "block";
  waitingMsg.textContent   = `Waiting for ${targetName} to respond…`;
  send({ type: "challenge", target_id: targetId });
  // Re-render so all challenge buttons go grey
  renderPlayerList(Array.from(playerList.querySelectorAll(".player-name")).map(function(s) {
    return { name: s.textContent };
  }));
}

acceptBtn.onclick = function() {
  challengeMod.classList.remove("visible");
  send({ type: "challenge_accept", from_id: pendingFromId });
};

declineBtn.onclick = function() {
  challengeMod.classList.remove("visible");
  send({ type: "challenge_decline", from_id: pendingFromId });
  pendingFromId = null;
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, duration) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, duration || 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
joinBtn.disabled = true;
connect();
</script>
</body>
</html>
